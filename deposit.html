<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Game - Deposit</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK (optional - only if you want auth protection) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="login-container">  <!-- Reusing same container class for consistent styling -->

        <!-- Top Bar -->
        <div class="top-bar">
            <button class="top-btn" onclick="window.location.href='index.html'">
                ← Back to Game
            </button>
        </div>

        <!-- Circular Logo -->
        <div style="margin: 20px 0 25px 0;">
            <img src="aviator-logo.png" 
                 alt="Aviator Logo" 
                 class="logo-circle">
        </div>

        <h1 style="color:white; margin:0 0 30px 0; font-size:32px; text-align:center;">Deposit Funds</h1>

        <!-- Deposit Form -->
        <div class="login-form">

            <div style="margin-bottom: 20px; text-align: center; color: #ccc; font-size: 15px;">
                Minimum deposit: ₦500
            </div>

            <input 
                type="number" 
                id="amount" 
                class="amount-input" 
                placeholder="Enter amount (₦)"
                min="500"
                style="margin-bottom:16px; font-size: 18px;"
            >

            <div style="margin-bottom:20px; padding:0 10px; font-size:14px; color:#aaa; text-align:center;">
                You will be redirected to Paystack to complete your payment securely.
            </div>

            <button id="depositBtn" class="invest-btn" style="width:100%; height:58px; margin-bottom:20px;">
                PAY NOW
            </button>

            <div id="message" style="text-align:center; margin:10px 0; font-size:14px; min-height:24px;"></div>

            <div style="text-align:center; margin-top:30px; color:#bbb; font-size:14px;">
                Need help? <a href="#" style="color:#00aa44; text-decoration:none;">Contact Support</a>
            </div>
        </div>
    </div>

    <script src="https://js.paystack.co/v1/inline.js"></script>

    <script>
        // ==================== YOUR FIREBASE CONFIG (uncomment if using auth) ====================
        const firebaseConfig = {
    apiKey: "AIzaSyCd2RbRPpx_qnU7W99ohe8el0rSpcYyIOU",
    authDomain: "success-75f95.firebaseapp.com",
    projectId: "success-75f95",
    storageBucket: "success-75f95.firebasestorage.app",
    messagingSenderId: "774097711994",
    appId: "1:774097711994:web:cb2729f49ed1348b2ddcc3"
};
        if (typeof firebase !== "undefined") {
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            userEmail = user.email;
        }
    });
}

        let userEmail = "";

firebase.auth().onAuthStateChanged((user) => {
    if (user) {
        userEmail = user.email;
    }
});

        /* DOM Elements */
        const amountInput = document.getElementById('amount');
        const depositBtn = document.getElementById('depositBtn');
        const messageDiv = document.getElementById('message');

        function showMessage(text, color = "#ff4444") {
            messageDiv.style.color = color;
            messageDiv.textContent = text;
            setTimeout(() => {
                messageDiv.textContent = "";
            }, 5000);
        }

        // Pay with Paystack
        function payWithPaystack() {
            let amount = parseFloat(amountInput.value);

            if (!userEmail || userEmail.trim() === "") {
    showMessage("Please wait, loading user session...", "red");
    return;
}

            if (!amount || amount < 500) {
                showMessage("Minimum deposit is ₦500", "#ffaa00");
                return;
            }

            depositBtn.disabled = true;
            depositBtn.textContent = "PROCESSING...";

            let handler = PaystackPop.setup({
                key: "pk_test_ff5168e3103fbd4034574de88fd3be28a623b863", // ← Replace with your real key
                email: userEmail,
                amount: amount * 100, // Paystack uses kobo (smallest unit)
                currency: "NGN",
               ref: `AVI-${Date.now()}-${crypto.randomUUID?.() || Math.floor(Math.random() * 999999)}`,

                callback: function(response) {
                    showMessage("Payment successful! Reference: " + response.reference, "lime");
                    console.log("Payment reference:", response.reference);
                    
                    // TODO: Send reference to your backend for verification
                    // Example: fetch('/verify-payment', { method: 'POST', body: JSON.stringify({ref: response.reference}) })

                    setTimeout(() => {
                        window.location.href = 'index.html'; // Redirect back to game
                    }, 2500);
                },

                onClose: function() {
    showMessage("Payment cancelled", "#ffaa00");

    depositBtn.disabled = false;
    depositBtn.textContent = "PAY NOW";

    amountInput.disabled = false;
    amountInput.value = "";
}
            });

            handler.openIframe();
        }

        // Button click
        depositBtn.addEventListener('click', payWithPaystack);

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                payWithPaystack();
            }
        });

        // Optional: Auto-focus amount input
        window.addEventListener("load", () => {
            amountInput.focus();
        });
    </script>
</body>
</html>
