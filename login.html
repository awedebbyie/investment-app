<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Game - Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="login-container">
        
        <!-- Top Bar -->
        <div class="top-bar">
            <button class="top-btn" onclick="window.location.href='index.html'">
                ← Back to Game
            </button>
        </div>

        <!-- Circular Logo -->
        <div style="margin: 20px 0 25px 0;">
            <img src="aviator-logo.png" 
                 alt="Aviator Logo" 
                 class="logo-circle">
        </div>

        <h1 style="color:white; margin:0 0 30px 0; font-size:32px; text-align:center;">Welcome</h1>

        <!-- Login Form -->
        <div class="login-form">
            
            <input 
                type="email" 
                id="email"
                class="amount-input" 
                placeholder="Email Address"
                style="margin-bottom:16px;"
            >

            <input 
                type="password" 
                id="password"
                class="amount-input" 
                placeholder="Password"
                style="margin-bottom:16px;"
            >

            <!-- Separate Checkboxes -->
            <div style="margin-bottom:20px; text-align:left; padding:0 10px;">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe" style="color:#ccc; font-size:14px; cursor:pointer; user-select:none;">
                        Remember Me
                    </label>
                </div>
                
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="keepSignedIn" checked>
                    <label for="keepSignedIn" style="color:#ccc; font-size:14px; cursor:pointer; user-select:none;">
                        Keep me signed in
                    </label>
                </div>
            </div>

            <button id="loginBtn" class="invest-btn" style="width:100%; height:58px; margin-bottom:12px;">
                LOGIN
            </button>

            <div style="text-align:center; margin:10px 0 20px 0;">
                <a href="#" id="forgotPassword" style="color:#00aa44; text-decoration:none; font-size:14px;">Forgot Password?</a>
            </div>

            <!-- Google Sign In -->
            <button id="googleBtn" style="width:100%; height:52px; background:#4285F4; color:white; border:none; border-radius:8px; font-size:16px; font-weight:500; cursor:pointer; margin-bottom:25px; display:flex; align-items:center; justify-content:center; gap:10px;">
    <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_24dp.png" 
         alt="Google" width="24" height="24" style="filter: brightness(0) invert(1);">
    Continue with Google
</button>

            <div id="message" style="text-align:center; margin:10px 0; font-size:14px; min-height:24px;"></div>

            <div style="text-align:center; margin-top:20px; color:#bbb; font-size:14px;">
                Don't have an account? 
                <a href="register.html" style="color:#00aa44; text-decoration:none;">Create Account</a>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener("load", () => {

    auth.getRedirectResult()
    .then((result) => {
        if (result.user) {
            window.location.href = "index.html";
        }
    })
    .catch((error) => {
        console.error("Redirect error:", error);
    });

    const savedEmail = localStorage.getItem('rememberedEmail');
    if (savedEmail) {
        document.getElementById('email').value = savedEmail;
        rememberMe.checked = true;
    }
});
        // ==================== YOUR FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCd2RbRPpx_qnU7W99ohe8el0rSpcYyIOU",
  authDomain: "success-75f95.firebaseapp.com",
  projectId: "success-75f95",
  storageBucket: "success-75f95.firebasestorage.app",
  messagingSenderId: "774097711994",
  appId: "1:774097711994:web:cb2729f49ed1348b2ddcc3",
  measurementId: "G-23QCNX9JN1"
        };
        firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* 1. DOM elements */
const messageDiv = document.getElementById('message');
const rememberMe = document.getElementById('rememberMe');
const keepSignedIn = document.getElementById('keepSignedIn');
const loginBtn = document.getElementById('loginBtn');
const googleBtn = document.getElementById('googleBtn');

/* 2. helper */
function showMessage(text, color = "#ff4444") {
    messageDiv.style.color = color;
    messageDiv.textContent = text;
}

        // Email & Password Login
loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        showMessage("Please enter email and password");
        return;
    }

    // ✅ FIX: disable button correctly while loading
    loginBtn.disabled = true;
    loginBtn.textContent = "LOGGING IN...";
    loginBtn.disabled = false;
loginBtn.textContent = "LOGIN";

    try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);

        if (rememberMe.checked) {
            localStorage.setItem('rememberedEmail', email);
        }

        showMessage("Login successful! Redirecting...", "lime");

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1500);

    } catch (error) {
        console.error("Login Error:", error.code, error.message);

        if (error.code === "auth/invalid-credential") {
            showMessage("Invalid email or password. Please check your details.");
        } 
        else if (error.code === "auth/user-not-found") {
            showMessage("No account found with this email.");
        } 
        else if (error.code === "auth/wrong-password") {
            showMessage("Incorrect password");
        } 
        else if (error.code === "auth/too-many-requests") {
            showMessage("Too many attempts. Try later.");
        } 
        else {
            showMessage("Something went wrong");
        }

    } finally {
        // ✅ ALWAYS reset button (this is the important part)
        loginBtn.disabled = false;
        loginBtn.textContent = "LOGIN";
    }
});
// Google Sign-In (popup method)
googleBtn.addEventListener('click', async () => {
    try {
        googleBtn.disabled = true;

        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({
            prompt: 'select_account'
        });

        const result = await auth.signInWithPopup(provider);

        console.log("SUCCESS", result);
        showMessage("Logged in Successfully", "lime");
        window.location.href = "index.html";

    } catch (error) {
        console.error("GOOGLE ERROR:", error);

        if (error.code === "auth/popup-closed-by-user") {
            showMessage("Login cancelled", "orange");
        } else {
            showMessage("Google login failed. Try again", "red");
        }

    } finally {
        googleBtn.disabled = false;
    }
});
        // Forgot Password
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showMessage("Please enter your email first");
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showMessage("Password reset link sent!", "#00aa44");
            } catch (error) {
    showMessage("Failed to send reset email", "red");
}
        });

        // Enter key support
        document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement.tagName !== 'A') {
        loginBtn.click();
    }
});
    </script>
</body>
</html>
