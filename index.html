<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Investment Game</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="game-container">

        <!-- GRAPH AREA -->
        <div class="graph-area">

            <div class="y-axis"></div>
            <div class="x-axis"></div>

            <div class="dot origin"></div>

            <div class="dot y1"></div>
            <div class="dot y2"></div>
            <div class="dot y3"></div>
            <div class="dot y4"></div>
            <div class="dot y5"></div>

            <div class="dot x1"></div>
            <div class="dot x2"></div>
            <div class="dot x3"></div>
            <div class="dot x4"></div>
            <div class="dot x5"></div>

        </div>

        <!-- CONTROLS -->
        <div class="controls">

            <!-- ROW 1 -->
            <div class="invest-row">

                <div class="left-side">

                    <!-- IMPORTANT: type changed to text -->
                    <input
                        type="text"
                        class="amount-input"
                        placeholder="Enter amount"
                    >

                    <div class="price-grid">

                        <button class="price-btn">100</button>
                        <button class="price-btn">200</button>
                        <button class="price-btn">300</button>
                        <button class="price-btn">400</button>
                        <button class="price-btn">500</button>

                        <button class="price-btn">600</button>
                        <button class="price-btn">700</button>
                        <button class="price-btn">800</button>
                        <button class="price-btn">900</button>
                        <button class="price-btn">1000</button>

                    </div>

                </div>

                <button class="invest-btn">INVEST</button>

            </div>

            <!-- ROW 2 -->
            <div class="invest-row">

                <div class="left-side">

                    <!-- IMPORTANT: type changed to text -->
                    <input
                        type="text"
                        class="amount-input"
                        placeholder="Enter amount"
                    >

                    <div class="price-grid">

                        <button class="price-btn">100</button>
                        <button class="price-btn">200</button>
                        <button class="price-btn">300</button>
                        <button class="price-btn">400</button>
                        <button class="price-btn">500</button>

                        <button class="price-btn">600</button>
                        <button class="price-btn">700</button>
                        <button class="price-btn">800</button>
                        <button class="price-btn">900</button>
                        <button class="price-btn">1000</button>

                    </div>

                </div>

                <button class="invest-btn">INVEST</button>

            </div>

        </div>

    </div>

    <script src="./script.js"></script>

</body>

</html>
