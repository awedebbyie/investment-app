<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Aviator Game</title>

    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

</head>

<body>
        <div class="game-container">
           <!-- Top Bar -->
<!-- Top Bar -->
<div class="top-bar" id="topBar">
    <!-- Default fallback (shown before JS loads) -->
    <button class="top-btn" onclick="window.location.href='login.html'">
        Login
    </button>
</div>
        <!-- GRAPH AREA -->

        <div class="graph-area">

            <!-- MULTIPLIER -->

            <div class="multiplier">
                1.00x
            </div>

            <!-- SVG -->

            <svg
                class="curve-svg"
                viewBox="0 0 400 320"
                preserveAspectRatio="none"
            >

                <path id="fillArea"></path>

                <path id="flightPath"></path>

            </svg>

            <!-- AXES -->

            <div class="y-axis"></div>

            <div class="x-axis"></div>

            <!-- DOTS -->

            <div class="dot origin"></div>

            <div class="dot y1"></div>
            <div class="dot y2"></div>
            <div class="dot y3"></div>
            <div class="dot y4"></div>
            <div class="dot y5"></div>

            <div class="dot x1"></div>
            <div class="dot x2"></div>
            <div class="dot x3"></div>
            <div class="dot x4"></div>
            <div class="dot x5"></div>

            <!-- HELICOPTER -->

            <img
                src="helicopter.png"
                alt="Helicopter"
                class="helicopter"
                id="helicopter"
            >

        </div>

        <!-- CONTROLS -->

        <div class="controls">

            <!-- ROW 1 -->

            <div class="invest-row">

                <div class="left-side">

                    <input
                        type="text"
                        class="amount-input"
                        placeholder="Enter amount"
                    >

                    <div class="price-grid">

                        <button class="price-btn">100</button>
                        <button class="price-btn">200</button>
                        <button class="price-btn">300</button>
                        <button class="price-btn">400</button>
                        <button class="price-btn">500</button>

                        <button class="price-btn">600</button>
                        <button class="price-btn">700</button>
                        <button class="price-btn">800</button>
                        <button class="price-btn">900</button>
                        <button class="price-btn">1000</button>

                    </div>

                </div>

                <button id="investBtn" class="invest-btn">
    INVEST
</button>
            </div>

            <!-- ROW 2 -->

            <div class="invest-row">

                <div class="left-side">

                    <input
                        type="text"
                        class="amount-input"
                        placeholder="Enter amount"
                    >

                    <div class="price-grid">

                        <button class="price-btn">100</button>
                        <button class="price-btn">200</button>
                        <button class="price-btn">300</button>
                        <button class="price-btn">400</button>
                        <button class="price-btn">500</button>

                        <button class="price-btn">600</button>
                        <button class="price-btn">700</button>
                        <button class="price-btn">800</button>
                        <button class="price-btn">900</button>
                        <button class="price-btn">1000</button>

                    </div>

                </div>

                <button class="invest-btn">

                    <div>
                        INVEST
                    </div>

                </button>

            </div>

        </div>

    </div>

    <script src="js/invest.js"></script>
    <script src="js/aviator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
     apiKey: "AIzaSyCd2RbRPpx_qnU7W99ohe8el0rSpcYyIOU",
  authDomain: "success-75f95.firebaseapp.com",
  projectId: "success-75f95",
  storageBucket: "success-75f95.firebasestorage.app",
  messagingSenderId: "774097711994",
  appId: "1:774097711994:web:cb2729f49ed1348b2ddcc3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const topBar = document.getElementById('topBar');

function updateTopBar(user) {
    if (user) {
        topBar.innerHTML = `
            <div style="display:flex; align-items:center; justify-content:space-between; width:100%; padding:0 12px; box-sizing:border-box;">
                <div style="color:#00ff88; font-weight:bold; font-size:18px;">
                    ₦<span id="balance">0.00</span>
                </div>
                <div style="display:flex; gap:12px;">
                    <button onclick="deposit()" style="background:#00aa44; color:white; border:none; padding:8px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">DEPOSIT</button>
                    <button onclick="withdraw()" style="background:#ff8800; color:white; border:none; padding:8px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">WITHDRAW</button>
                </div>
                <button onclick="showSettings()" style="background:none; border:none; font-size:28px; cursor:pointer; color:white; padding:5px;">⚙️</button>
            </div>
        `;
    } else {
        topBar.innerHTML = `
            <button class="top-btn" onclick="window.location.href='login.html'">Login</button>
        `;
    }
}

// Main listener
auth.onAuthStateChanged(updateTopBar);

// Important: Force correct initial state
window.addEventListener('load', () => {
    // Small delay to let Firebase check auth state
    setTimeout(() => {
        updateTopBar(auth.currentUser);
    }, 600);
});

function deposit() { alert("Deposit feature coming soon!"); }
function withdraw() { alert("Withdraw feature coming soon!"); }
function showSettings() { 
    if (confirm("Do you want to Logout?")) {
        auth.signOut().then(() => window.location.reload());
    }
}
firebase.auth().onAuthStateChanged((user) => {
    if (user) {
        // LOGGED IN UI
        document.getElementById("topBar").innerHTML = `
            <button>Deposit</button>
            <button>Withdraw</button>
            <button>Settings</button>
            <span>Balance: ₦0</span>
        `;
    } else {
        // NOT LOGGED IN UI
        document.getElementById("topBar").innerHTML = `
            <button onclick="location.href='login.html'">Login</button>
        `;
    }
});

document.getElementById("investBtn").addEventListener("click", () => {
    const user = firebase.auth().currentUser;

    if (!user) {
        showMessage("Please login to invest", "red");
        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);
        return;
    }

    // continue invest logic here
});

firebase.auth().onAuthStateChanged((user) => {

    if (user) {
        console.log("User logged in:", user.email);

        // Example: show balance / enable features
        document.getElementById("balance").style.display = "block";
        document.getElementById("investBtn").disabled = false;

    } else {
        console.log("No user logged in");

        // Lock features
        document.getElementById("balance").style.display = "none";
        document.getElementById("investBtn").disabled = true;

        // OPTIONAL: redirect to login if you want strict mode
        // window.location.href = "login.html";
    }

});
</script>

</body>

</html>
