<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aviator Game</title>

    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

</head>

<body>

<div class="game-container">

<!-- Top Bar -->
<div class="top-bar" id="topBar">
    <button class="top-btn" onclick="window.location.href='login.html'">
        Login
    </button>
</div>

<!-- GRAPH AREA -->
<div class="graph-area">
    <div class="multiplier">1.00x</div>

    <svg class="curve-svg" viewBox="0 0 400 320" preserveAspectRatio="none">
        <path id="fillArea"></path>
        <path id="flightPath"></path>
    </svg>

    <div class="y-axis"></div>
    <div class="x-axis"></div>

    <div class="dot origin"></div>
    <div class="dot y1"></div>
    <div class="dot y2"></div>
    <div class="dot y3"></div>
    <div class="dot y4"></div>
    <div class="dot y5"></div>

    <div class="dot x1"></div>
    <div class="dot x2"></div>
    <div class="dot x3"></div>
    <div class="dot x4"></div>
    <div class="dot x5"></div>

    <img src="helicopter.png" class="helicopter" id="helicopter">
</div>

<!-- CONTROLS -->
<div class="controls">

    <div class="controls">

    <!-- ROW 1 -->
    <div class="invest-row">

        <div class="left-side">

            <input type="text" class="amount-input" placeholder="Enter amount">

            <div class="price-grid">
                <button class="price-btn">100</button>
                <button class="price-btn">200</button>
                <button class="price-btn">300</button>
                <button class="price-btn">400</button>
                <button class="price-btn">500</button>
                <button class="price-btn">600</button>
                <button class="price-btn">700</button>
                <button class="price-btn">800</button>
                <button class="price-btn">900</button>
                <button class="price-btn">1000</button>
            </div>

        </div>

        <button id="investBtn" class="invest-btn">INVEST</button>

    </div>

    <!-- ROW 2 (RESTORED EXACTLY) -->
    <div class="invest-row">

        <div class="left-side">

            <input type="text" class="amount-input" placeholder="Enter amount">

            <div class="price-grid">
                <button class="price-btn">100</button>
                <button class="price-btn">200</button>
                <button class="price-btn">300</button>
                <button class="price-btn">400</button>
                <button class="price-btn">500</button>
                <button class="price-btn">600</button>
                <button class="price-btn">700</button>
                <button class="price-btn">800</button>
                <button class="price-btn">900</button>
                <button class="price-btn">1000</button>
            </div>

        </div>

        <!-- IMPORTANT: no second investBtn (keep only visual button) -->
        <button id="investBtn2" class="invest-btn">INVEST</button>

    </div>

</div>
</div>

<script src="js/invest.js"></script>
<script src="js/aviator.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "AIzaSyCd2RbRPpx_qnU7W99ohe8el0rSpcYyIOU",
    authDomain: "success-75f95.firebaseapp.com",
    projectId: "success-75f95",
    storageBucket: "success-75f95.firebasestorage.app",
    messagingSenderId: "774097711994",
    appId: "1:774097711994:web:cb2729f49ed1348b2ddcc3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
let isLoggedIn = false;

firebase.auth().onAuthStateChanged((user) => {
    isLoggedIn = !!user;
});

function handleInvest() {
    const user = firebase.auth().currentUser;

    if (!user) {
        showMessage("You need to login", "red");
        setTimeout(() => {
            window.location.href = "login.html";
        }, 1200);
        return;
    }

    // your real invest logic here
    showMessage("Invest successful", "lime");
}

// FIRST INVEST BUTTON
const investBtn = document.getElementById("investBtn");
if (investBtn) {
    investBtn.addEventListener("click", handleInvest);
}

// SECOND INVEST BUTTON
const investBtn2 = document.getElementById("investBtn2");
if (investBtn2) {
    investBtn2.addEventListener("click", handleInvest);
}

// FIX 1: SAFE MESSAGE FUNCTION (WAS MISSING)
function showMessage(text, color = "red") {
    let msg = document.getElementById("gameMessage");

    if (!msg) {
        msg = document.createElement("div");
        msg.id = "gameMessage";
        msg.style.position = "fixed";
        msg.style.bottom = "20px";
        msg.style.left = "50%";
        msg.style.transform = "translateX(-50%)";
        msg.style.background = "rgba(0,0,0,0.8)";
        msg.style.color = "white";
        msg.style.padding = "10px 20px";
        msg.style.borderRadius = "8px";
        msg.style.zIndex = "9999";
        document.body.appendChild(msg);
    }

    msg.style.color = color;
    msg.textContent = text;

    setTimeout(() => {
        msg.textContent = "";
    }, 2000);
}

// FIX 2: TOPBAR SAFE REFERENCE
const topBar = document.getElementById('topBar');

// FIX 3: SINGLE AUTH LISTENER (removed duplicates)
function updateTopBar(user) {
    if (!topBar) return;

    if (user) {
        topBar.innerHTML = `
            <div style="display:flex; align-items:center; justify-content:space-between; width:100%; padding:0 12px;">
                <div style="color:#00ff88; font-weight:bold;">
                    ₦<span id="balance">0.00</span>
                </div>

                <div style="display:flex; gap:10px;">
                    <button onclick="deposit()">DEPOSIT</button>
                    <button onclick="withdraw()">WITHDRAW</button>
                </div>

                <button onclick="showSettings()">⚙️</button>
            </div>
        `;
    } else {
        topBar.innerHTML = `
            <button class="top-btn" onclick="window.location.href='login.html'">
                Login
            </button>
        `;
    }
}

auth.onAuthStateChanged(updateTopBar);

// FIX 4: INVEST BUTTON SAFETY

// FIX 5: SAFE BALANCE HANDLING (no crash)
auth.onAuthStateChanged((user) => {

    const balance = document.getElementById("balance");

    if (user) {
        console.log("User logged in:", user.email);

        if (balance) {
            balance.style.display = "block";
        }

        if (investBtn) {
            investBtn.disabled = false;
        }

    } else {
        console.log("No user logged in");

        if (balance) {
            balance.style.display = "none";
        }

        if (investBtn) {
            investBtn.disabled = true;
        }
    }
});

// FIX 6: ACTION FUNCTIONS
function deposit() {
    alert("Deposit coming soon");
}

function withdraw() {
    alert("Withdraw coming soon");
}

function showSettings() {
    if (confirm("Logout?")) {
        auth.signOut().then(() => location.reload());
    }
}

</script>

</body>
</html>
