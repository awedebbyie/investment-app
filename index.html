<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aviator Game</title>

    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

</head>

<body>

<div class="game-container">

<!-- Top Bar -->
<div class="top-bar" id="topBar">
    <button class="top-btn" onclick="window.location.href='login.html'">
        Login
    </button>
</div>

<!-- GRAPH AREA -->
<div class="graph-area">
    <div class="multiplier">1.00x</div>

    <svg class="curve-svg" viewBox="0 0 400 320" preserveAspectRatio="none">
        <path id="fillArea"></path>
        <path id="flightPath"></path>
    </svg>

    <div class="y-axis"></div>
    <div class="x-axis"></div>

    <div class="dot origin"></div>
    <div class="dot y1"></div>
    <div class="dot y2"></div>
    <div class="dot y3"></div>
    <div class="dot y4"></div>
    <div class="dot y5"></div>

    <div class="dot x1"></div>
    <div class="dot x2"></div>
    <div class="dot x3"></div>
    <div class="dot x4"></div>
    <div class="dot x5"></div>

    <img src="helicopter.png" class="helicopter" id="helicopter">
</div>

<!-- CONTROLS -->
<div class="controls">

    <!-- ROW 1 -->
    <div class="invest-row">

        <div class="left-side">

            <input type="text" class="amount-input" placeholder="Enter amount">

            <div class="price-grid">
                <button class="price-btn">100</button>
                <button class="price-btn">200</button>
                <button class="price-btn">300</button>
                <button class="price-btn">400</button>
                <button class="price-btn">500</button>
                <button class="price-btn">600</button>
                <button class="price-btn">700</button>
                <button class="price-btn">800</button>
                <button class="price-btn">900</button>
                <button class="price-btn">1000</button>
            </div>

        </div>

        <button id="investBtn" class="invest-btn" disabled>INVEST</button>

    </div>

    <!-- ROW 2 -->
    <div class="invest-row">

        <div class="left-side">

            <input type="text" class="amount-input" placeholder="Enter amount">

            <div class="price-grid">
                <button class="price-btn">100</button>
                <button class="price-btn">200</button>
                <button class="price-btn">300</button>
                <button class="price-btn">400</button>
                <button class="price-btn">500</button>
                <button class="price-btn">600</button>
                <button class="price-btn">700</button>
                <button class="price-btn">800</button>
                <button class="price-btn">900</button>
                <button class="price-btn">1000</button>
            </div>

        </div>

        <button id="investBtn2" class="invest-btn" disabled>INVEST</button>

    </div>

</div>

<script src="js/invest.js"></script>
<script src="js/aviator.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "AIzaSyCd2RbRPpx_qnU7W99ohe8el0rSpcYyIOU",
    authDomain: "success-75f95.firebaseapp.com",
    projectId: "success-75f95",
    storageBucket: "success-75f95.firebasestorage.app",
    messagingSenderId: "774097711994",
    appId: "1:774097711994:web:cb2729f49ed1348b2ddcc3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function showSettings() {
    if (confirm("Do you want to logout?")) {
        auth.signOut().then(() => location.reload());
    }
}

// ================= FIX 1: SAFE MESSAGE =================
function showMessage(text, color = "red") {
    let msg = document.getElementById("gameMessage");

    if (!msg) {
        msg = document.createElement("div");
        msg.id = "gameMessage";
        msg.style.position = "fixed";
        msg.style.bottom = "20px";
        msg.style.left = "50%";
        msg.style.transform = "translateX(-50%)";
        msg.style.background = "rgba(0,0,0,0.9)";
        msg.style.padding = "12px 24px";
        msg.style.borderRadius = "8px";
        msg.style.zIndex = "9999";
        msg.style.fontWeight = "bold";
        msg.style.textAlign = "center";
        document.body.appendChild(msg);
    }

    msg.style.color = color;
    msg.textContent = text;

    setTimeout(() => {
        if (msg) msg.textContent = "";
    }, 3000);
}


// ================= INVEST CONTROL =================
function handleInvest() {
    const user = auth.currentUser;

    if (!user) {
        showMessage("You need to login. Investments can only be placed when a user is logged in.", "red");
        return;
    }

    // ✅ Only runs when logged in
    showMessage("Invest successful", "lime");

    // your real invest logic here
}

// ================= BUTTON STATE MANAGEMENT =================
function updateInvestButtons(isLoggedIn) {
    const btn1 = document.getElementById("investBtn");
    const btn2 = document.getElementById("investBtn2");

    if (isLoggedIn) {
        btn1.disabled = false;
        btn2.disabled = false;
        btn1.style.opacity = "1";
        btn2.style.opacity = "1";
        btn1.style.cursor = "pointer";
        btn2.style.cursor = "pointer";
    } else {
        btn1.disabled = true;
        btn2.disabled = true;
        btn1.style.opacity = "0.6";
        btn2.style.opacity = "0.6";
        btn1.style.cursor = "not-allowed";
        btn2.style.cursor = "not-allowed";
    }
}

// ================= AUTH STATE =================
auth.onAuthStateChanged((user) => {
    const topBar = document.getElementById("topBar");

    if (user) {
        topBar.innerHTML = `
    <div style="display:flex; align-items:center; justify-content:space-between; width:100%; padding:0 12px; box-sizing:border-box;">
        
        <div style="color:#00ff88; font-weight:bold; font-size:18px;">
            ₦<span id="balance">0.00</span>
        </div>

        <div style="display:flex; gap:12px;">
            <button onclick="deposit()" style="background:#00aa44; color:white; border:none; padding:8px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">
                DEPOSIT
            </button>

            <button onclick="withdraw()" style="background:#ff8800; color:white; border:none; padding:8px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">
                WITHDRAW
            </button>
        </div>

        <button onclick="showSettings()" style="background:none; border:none; font-size:28px; cursor:pointer; color:white; padding:5px;">
            ⚙️
        </button>

    </div>
`;
        updateInvestButtons(true);
    } else {
        topBar.innerHTML = `
            <button class="top-btn" onclick="window.location.href='login.html'">
                Login
            </button>
        `;
        updateInvestButtons(false);
    }
});

// ================= FIX 3: BOTH BUTTONS =================
document.getElementById("investBtn").addEventListener("click", handleInvest);
document.getElementById("investBtn2").addEventListener("click", handleInvest);

</script>

</body>
</html>
